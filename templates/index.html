<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → Markdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #383838;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #5DCAA5;
    --accent2: #1D9E75;
    --amber: #EF9F27;
    --red: #E24B4A;
    --blue: #378ADD;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    background: #1a2e25;
    color: var(--accent);
    border: 1px solid #2a4a38;
  }

  .status-badge.error {
    background: #2a1515;
    color: var(--red);
    border-color: #4a2020;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
    min-height: 0;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 2rem 1.5rem;
    gap: 1.5rem;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  /* Drop Zone */
  .dropzone {
    border: 1.5px dashed var(--border2);
    border-radius: 10px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: #0d1f18;
  }

  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 1rem;
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dropzone:hover .drop-icon, .dropzone.dragover .drop-icon {
    border-color: var(--accent);
  }

  .drop-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--text2);
  }

  .file-selected {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #0d1f18;
    border-radius: 6px;
    border: 1px solid #2a4a38;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    margin-top: 0.75rem;
    word-break: break-all;
  }

  .file-selected.visible { display: flex; }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 13px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px 12px;
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 12px;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.4;
  }

  .mode-btn:first-child { border-right: 1px solid var(--border); }

  .mode-btn.active {
    background: var(--bg3);
    color: var(--text);
  }

  .mode-btn span {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  .mode-btn.active span { color: var(--accent); }

  /* Convert Button */
  .btn-convert {
    width: 100%;
    padding: 13px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-convert:hover { background: var(--accent); }
  .btn-convert:active { transform: scale(0.98); }
  .btn-convert:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-top: 4px;
  }

  /* Output Panel */
  .output-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .output-toolbar {
    border-bottom: 1px solid var(--border);
    padding: 0.875rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-shrink: 0;
  }

  .toolbar-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    padding: 6px 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }

  .btn-sm:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

  .output-content {
    flex: 1;
    overflow: auto;
    padding: 2rem 2rem;
    position: relative;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: var(--text3);
    font-size: 13px;
    pointer-events: none;
  }

  .placeholder-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 380px;
  }

  .placeholder-line {
    height: 12px;
    background: var(--border);
    border-radius: 3px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  .markdown-output {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }

  .markdown-output.visible { display: block; }

  /* Progress */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    display: none;
    flex-shrink: 0;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    position: absolute;
    top: 0; left: -100%;
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 1.5s ease-in-out infinite;
  }

  @keyframes scan {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  .error-msg {
    background: #2a1515;
    border: 1px solid #4a2020;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    display: none;
    line-height: 1.6;
  }

  .error-msg.visible { display: block; }

  .copied-toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--accent2);
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .copied-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">MD</div>
    pdf2md
  </div>
  <div id="statusBadge" class="status-badge">verificando...</div>
</header>

<main>
  <aside class="sidebar">

    <div>
      <div class="section-label">arquivo</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="drop-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
        </div>
        <div class="drop-title">Arraste o PDF aqui</div>
        <div class="drop-sub">ou clique para selecionar</div>
      </div>
      <div class="file-selected" id="fileSelected">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span id="fileName">—</span>
      </div>
    </div>

    <div>
      <div class="section-label">modo de extração</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnLocal" onclick="setMode('local')">
          Local
          <span>CPU · sem internet</span>
        </button>
        <button class="mode-btn" id="btnHybrid" onclick="setMode('hybrid')">
          Híbrido IA
          <span>tabelas · OCR</span>
        </button>
      </div>
    </div>

    <button class="btn-convert" id="btnConvert" disabled onclick="convert()">
      converter
    </button>

    <div id="statsSection" style="display:none;">
      <div class="section-label">resultado</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">palavras</div>
          <div class="stat-value" id="statWords">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">linhas</div>
          <div class="stat-value" id="statLines">—</div>
        </div>
      </div>
    </div>

  </aside>

  <section class="output-panel">
    <div class="output-toolbar">
      <span class="toolbar-title" id="toolbarTitle">aguardando arquivo...</span>
      <div class="toolbar-actions">
        <button class="btn-sm" id="btnCopy" disabled onclick="copyMarkdown()">copiar</button>
        <button class="btn-sm" id="btnDownload" disabled onclick="downloadMarkdown()">baixar .md</button>
      </div>
    </div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill"></div></div>

    <div class="output-content">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-grid">
          <div class="placeholder-line" style="width:90%"></div>
          <div class="placeholder-line" style="width:70%"></div>
          <div class="placeholder-line" style="width:85%"></div>
          <div class="placeholder-line" style="width:55%"></div>
          <div class="placeholder-line" style="width:80%"></div>
        </div>
        <span style="margin-top:1rem; font-family: var(--mono); font-size:12px;">seu markdown vai aparecer aqui</span>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <pre class="markdown-output" id="markdownOutput"></pre>
    </div>
  </section>
</main>

<div class="copied-toast" id="toast">copiado!</div>

<script>
let selectedFile = null;
let currentMode = 'local';
let currentMarkdown = '';
let currentFilename = 'output';

async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    const badge = document.getElementById('statusBadge');
    if (d.ok) {
      badge.textContent = 'opendataloader OK';
      badge.className = 'status-badge';
    } else {
      badge.textContent = 'lib não instalada';
      badge.className = 'status-badge error';
    }
  } catch(e) {
    document.getElementById('statusBadge').textContent = 'servidor offline';
    document.getElementById('statusBadge').className = 'status-badge error';
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnLocal').className = 'mode-btn' + (mode === 'local' ? ' active' : '');
  document.getElementById('btnHybrid').className = 'mode-btn' + (mode === 'hybrid' ? ' active' : '');
}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.pdf')) setFile(f);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  selectedFile = f;
  currentFilename = f.name.replace('.pdf', '');
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSelected').classList.add('visible');
  document.getElementById('btnConvert').disabled = false;
}

async function convert() {
  if (!selectedFile) return;

  document.getElementById('btnConvert').disabled = true;
  document.getElementById('progressBar').classList.add('visible');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('errorMsg').classList.remove('visible');
  document.getElementById('markdownOutput').classList.remove('visible');
  document.getElementById('toolbarTitle').textContent = 'convertendo...';
  document.getElementById('statsSection').style.display = 'none';
  document.getElementById('btnCopy').disabled = true;
  document.getElementById('btnDownload').disabled = true;

  const form = new FormData();
  form.append('file', selectedFile);
  form.append('mode', currentMode);

  try {
    const r = await fetch('/api/convert', { method: 'POST', body: form });
    const d = await r.json();

    document.getElementById('progressBar').classList.remove('visible');
    document.getElementById('btnConvert').disabled = false;

    if (!d.ok) throw new Error(d.error || 'Erro desconhecido');

    currentMarkdown = d.markdown;
    document.getElementById('markdownOutput').textContent = d.markdown;
    document.getElementById('markdownOutput').classList.add('visible');
    document.getElementById('toolbarTitle').textContent = d.stats.filename + '  ·  modo ' + d.stats.mode;

    document.getElementById('statWords').textContent = d.stats.words.toLocaleString('pt-BR');
    document.getElementById('statLines').textContent = d.stats.lines.toLocaleString('pt-BR');
    document.getElementById('statsSection').style.display = 'block';

    document.getElementById('btnCopy').disabled = false;
    document.getElementById('btnDownload').disabled = false;

  } catch(e) {
    document.getElementById('progressBar').classList.remove('visible');
    document.getElementById('btnConvert').disabled = false;
    const err = document.getElementById('errorMsg');
    err.textContent = '⚠ ' + e.message;
    err.classList.add('visible');
    document.getElementById('toolbarTitle').textContent = 'erro na conversão';
  }
}

function copyMarkdown() {
  if (!currentMarkdown) return;
  navigator.clipboard.writeText(currentMarkdown).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function downloadMarkdown() {
  if (!currentMarkdown) return;
  const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFilename + '.md';
  a.click();
}

checkHealth();
</script>
</body>
</html>
